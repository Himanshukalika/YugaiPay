name: yugai_pay
description: "YugaiPay — A modern digital payment application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.3

  # UI
  google_fonts: ^6.2.1
  vector_math: ^2.1.4
  flutter_svg: ^2.0.16
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Security / Biometrics
  local_auth: ^2.3.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/png/
    - assets/icon/png/insurance/
    - assets/icon/png/investment/
